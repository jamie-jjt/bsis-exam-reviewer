<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BSIS Entrance Exam Reviewer</title>

<style>
/* ===== Global Reset & Base ===== */
*, *::before, *::after {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    padding: 0 16px 32px;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background: radial-gradient(circle at top left, rgba(84, 145, 255, 0.32), transparent 22%),
                radial-gradient(circle at bottom right, rgba(255, 83, 198, 0.25), transparent 18%),
                linear-gradient(135deg, #0b162f 0%, #172846 48%, #1f3050 100%);
    color: #eef2ff;
    overflow-x: hidden;
}

body > * {
    max-width: 900px;
    margin: auto;
    padding: 0;
}

h2 {
    text-align: center;
    margin: 30px auto 10px;
    font-size: clamp(2rem, 4vw, 2.8rem);
    letter-spacing: 0.08em;
    color: #f4f8ff;
    text-transform: uppercase;
}

h2 span {
    display: block;
    margin-top: 10px;
    font-size: 0.85rem;
    font-weight: 400;
    color: #9bb3da;
    letter-spacing: 0.2em;
}

.card {
    background: rgba(14, 28, 58, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 28px;
    margin-top: 24px;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.32);
    backdrop-filter: blur(16px);
    animation: floatIn 0.45s ease-out both;
}

button {
    display: block;
    width: 100%;
    padding: 16px 18px;
    margin: 12px 0;
    border: none;
    border-radius: 18px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    color: #f7fbff;
    background: rgba(255, 255, 255, 0.08);
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 24px 45px rgba(0,0,0,0.18);
}

button:hover {
    transform: translateY(-3px);
    background: rgba(255, 255, 255, 0.12);
}

button:active {
    transform: translateY(-1px) scale(0.99);
}

#start button,
#nextBtn {
    background: linear-gradient(135deg, #408cff, #45e9ff);
    color: #081122;
}

#start button:hover,
#nextBtn:hover {
    background: linear-gradient(135deg, #2c6ddc, #2dbbdf);
}

#question {
    margin: 0 0 24px;
    font-size: clamp(1.15rem, 2vw, 1.45rem);
    font-weight: 600;
    line-height: 1.55;
    color: #f4f8ff;
}

#choices button {
    text-align: left;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.06);
    color: #eef5ff;
}

#choices button:not(:last-child) {
    margin-bottom: 14px;
}

#choices button:hover {
    background: rgba(255,255,255,0.14);
}

#result {
    margin-top: 18px;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.01em;
}

.correct {
    color: #7ffcc8;
}

.incorrect {
    color: #ff95a3;
}

#explanation {
    margin-top: 16px;
    padding: 18px;
    background: rgba(255,255,255,0.08);
    border-left: 4px solid rgba(66, 144, 226, 0.95);
    border-radius: 16px;
    font-size: 0.98rem;
    line-height: 1.7;
    color: #dbe5ff;
}

.progress {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    font-size: 0.95rem;
    color: #a6b6dd;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

#progressText {
    flex: 1;
}

.meter {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

.meter span {
    display: block;
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #45e9ff 0%, #6f79ff 100%);
    transition: width 0.35s ease;
}

#summary {
    padding: 32px 28px;
    text-align: center;
}

#summary h3 {
    margin: 18px 0 10px;
    color: #f7fbff;
}

#summary p {
    font-size: 1.1rem;
    font-weight: 600;
    color: #b7c5e7;
}

.hidden {
    display: none;
}

@keyframes floatIn {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

#reviewBtn {
  position: fixed;
  right: 22px;
  bottom: 22px;
  top: auto;
  transform: none;
  padding: 16px 22px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  cursor: pointer;
  font-weight: 700;
  background: rgba(255,255,255,0.08);
  color: #f6fbff;
  z-index: 999;
  box-shadow: 0 24px 50px rgba(0, 0, 0, 0.22);
  min-width: 210px;
  text-align: center;
  backdrop-filter: blur(12px);
  transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
}

#reviewBtn:hover {
  background: rgba(255,255,255,0.14);
  transform: translateY(-2px);
  box-shadow: 0 28px 60px rgba(0, 0, 0, 0.26);
}

#reviewBtn::after {
  content: '→';
  display: inline-block;
  margin-left: 10px;
  opacity: 0.95;
}

@media (max-width: 650px) {
    body {
        padding: 0 12px 24px;
    }

    .card {
        padding: 22px;
        border-radius: 22px;
    }

    button {
        padding: 14px 16px;
        font-size: 0.97rem;
    }
}
</style>
</head>

let examQuestions = [];
let current = 0;
let score = 0;
let locked = false;

function goToReview() {
    window.location.href = "review.html";
}

function startExam(num) {
    examQuestions = [...questions].sort(() => Math.random() - 0.5).slice(0, num);
    current = 0;
    score = 0;

    document.getElementById("start").classList.add("hidden");
    document.getElementById("exam").classList.remove("hidden");

    loadQuestion();
}

function loadQuestion() {
    locked = false;

    let q = examQuestions[current];
    let percent = Math.round((current / examQuestions.length) * 100);

    document.getElementById("progressText").innerText = "Exam in progress";
    document.getElementById("progressPercent").innerText = `${percent}%`;
    document.getElementById("progressBar").style.width = `${percent}%`;

    document.getElementById("question").innerText = q.q.replace(/^\d+\.\s*/, "");

    let html = "";
    q.choices.forEach((c, i) => {
        html += `<button onclick="checkAnswer(${i})">${c}</button>`;
    });

    document.getElementById("choices").innerHTML = html;
    document.getElementById("result").innerText = "";
    document.getElementById("explanation").innerText = "";
    document.getElementById("nextBtn").classList.add("hidden");
}

function checkAnswer(i) {
    if (locked) return;
    locked = true;

    let q = examQuestions[current];

    if (i === q.answer) {
        score++;
        document.getElementById("result").innerHTML = "✅ Correct";
    } else {
        document.getElementById("result").innerHTML = "❌ Incorrect";
    }

    document.getElementById("explanation").innerText = q.exp;
    document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion() {
    current++;
    if (current >= examQuestions.length) {
        finishExam();
    } else {
        loadQuestion();
    }
}

function finishExam() {
    document.getElementById("exam").classList.add("hidden");
    document.getElementById("summary").classList.remove("hidden");

    let percent = (score / examQuestions.length) * 100;

    let remark = percent >= 80 ? "Excellent" :
                 percent >= 60 ? "Good" :
                 percent >= 40 ? "Needs Improvement" :
                 "Poor";

    document.getElementById("summary").innerHTML =
        `<h3>Score: ${score}/${examQuestions.length}</h3>
         <h3>${percent.toFixed(2)}%</h3>
         <p>${remark}</p>`;
}
